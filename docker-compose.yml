services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops_secret
      POSTGRES_DB: finops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U finops -d finops_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/finops_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://finops:finops_secret@postgres:5432/finops_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: finops_neo4j
      ENVIRONMENT: development
      DATA_DIR: /app/data/synthetic
      OLLAMA_URL: http://host.docker.internal:11434
      FINOPS_MODEL: finops-aws
      PYTHONPATH: /app
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/synthetic:/app/data/synthetic:ro
      - ./data/behavioral:/app/data/behavioral:ro
      - ./data/rag_index:/app/data/rag_index
      - ./data/cur_exports:/app/data/cur_exports
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_TARGET: http://backend:8000
      VITE_PORT: "3001"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
