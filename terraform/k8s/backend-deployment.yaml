apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: finops
  labels:
    app: backend
    app.kubernetes.io/part-of: finops-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend
      nodeSelector:
        role: app
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/finops-ai-dev/backend:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: finops-config
            - secretRef:
                name: finops-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: synthetic-data
              mountPath: /app/data/synthetic
              readOnly: true
      volumes:
        - name: synthetic-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: finops
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: finops
  annotations:
    eks.amazonaws.com/role-arn: "REPLACE_WITH_BACKEND_ROLE_ARN"
  labels:
    app: backend
