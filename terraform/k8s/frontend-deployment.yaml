apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finops
  labels:
    app: frontend
    app.kubernetes.io/part-of: finops-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        role: app
      containers:
        - name: frontend
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/finops-ai-dev/frontend:latest
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: VITE_API_TARGET
              value: "http://backend:8000"
            - name: VITE_PORT
              value: "3001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: finops
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  type: ClusterIP
